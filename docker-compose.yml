# docker-compose for LOCAL testing of the production container.
# Brings up a MySQL 8 database plus the backend built from the Dockerfile,
# mirroring how Railway runs it (prod profile, DB host injected via env vars).
services:
  mysql:
    image: mysql:8.4
    container_name: techwatch-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: techwatch_db
    ports:
      # Host 3307 -> container 3306 to avoid clashing with a local MySQL on 3306
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - techwatch_mysql_data:/var/lib/mysql

  backend:
    image: techwatch-backend:1.0.0
    container_name: techwatch-backend
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: techwatch_db
      DATABASE_USER: root
      DATABASE_PASSWORD: rootpassword
      PORT: 8080

volumes:
  techwatch_mysql_data:
