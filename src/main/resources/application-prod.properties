# Production profile
# Database settings are read from environment variables provided by the runtime
# (Docker / Railway). These MUST be supplied by the hosting provider.
spring.datasource.url=jdbc:mysql://${DATABASE_URL}:${DATABASE_PORT:3306}/${DATABASE_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# Production-lean JPA behavior.
# ddl-auto=update lets Hibernate create the schema on first boot against the
# empty managed database (the project ships no migrations or seed scripts).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Keep Open Session In View enabled (Spring Boot default) so REST resource
# assemblers can read lazy associations (e.g. Property.spaces) during JSON
# serialization, matching the dev profile the app was developed against.
spring.jpa.open-in-view=true

# App port (Railway injects PORT at runtime; defaults to 8080 elsewhere)
server.port=${PORT:8080}

# CORS: comma-separated list of allowed origins for browser clients (frontend).
# Defaults to "*" (any origin). Override with CORS_ALLOWED_ORIGINS in the host
# to restrict it to the deployed frontend URL.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
