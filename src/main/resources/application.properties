# Spring Application Name
spring.application.name=TechWatch Platform

# Default to development when no explicit profile is provided.
# SPRING_PROFILES_ACTIVE (set by Docker/Railway) overrides this when present.
spring.profiles.default=${SPRING_PROFILES_ACTIVE:dev}

# Shared Spring DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Shared Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.naming.physical-strategy=com.techwatch.techwatchbackend.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
# Elements take their values from maven pom.xml build-related information
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# Analytics consumption alert thresholds (in Wh). A usage value at or above each
# threshold triggers an alert with the corresponding severity.
analytics.alert.threshold.low=50
analytics.alert.threshold.medium=150
analytics.alert.threshold.high=300

# JWT Configuration Properties
authorization.jwt.secret=${JWT_SECRET:WriteHereYourSecretStringForTokenSigningCredentials}
authorization.jwt.expiration.days=7
